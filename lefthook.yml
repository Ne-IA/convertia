# lefthook.yml - the L1/L2/L3 git-hook plane executor (P0.2.2).
#
# lefthook itself is pinned + checksum-verified via scripts/install-gate-tools
# (P0.2.1): a poisoned lefthook can silently no-op EVERY local hook (the
# core.hooksPath-bypass equivalent), so the G54 gate-plane-integrity check
# (scripts/check-gate-plane, P0.2.3) asserts the hooks are installed + not
# redirected on every run, and the L4 CI mirror re-invokes the same hooks.
#
# CHRONOLOGICAL PLANE <-> HOOK MAPPING (security-concept sec3):
#   pre-commit = L1  (fires at `git commit`;                  soft budget < 10 s; diff-scoped)
#   commit-msg = L3  (fires at `git commit`, BEFORE pre-push; conventional-commit + dual-review trailer)
#   pre-push   = L2  (fires at `git push`;                    budget < 3 min; range / full-tree)
# Stated explicitly so commit-msg (L3) is never wired into pre-push or omitted.
# commit-msg (L3) is DECLARED below as of P0.3.3 (G11 conventional-commit subject);
# G12 (the Dual-Review trailer) is the L2 pre-push half of the commit-hygiene plane.
#
# GATE SLOTS: each L1/L2/L3 gate is added to the slots below by the box that BUILDS
# it (so a gate is wired only after it is built + self-tested) - remaining:
# plan-lint (P0.3.5), G8 (P0.3.4), G70 (P0.3.14), clippy/tsc (P0.4).
#
# Requires Python 3.11+ on PATH as `python3` (the stdlib-only gate scripts) and
# the pinned tools installed under .gate-tools/bin (scripts/install-gate-tools).
# This file is L(-1) security-critical (scripts/l-neg1-files.toml, G71).

min_version: "2.1.9"
assert_lefthook_installed: true

pre-commit:        # L1 - soft budget < 10 s; diff-scoped gates added per-box
  parallel: true
  commands:
    gate-plane-integrity:
      run: python3 scripts/check-gate-plane
    gate-plane-config:
      run: python3 scripts/check-gate-planes
    gitleaks:        # G2 - scan the staged diff for the 3 CI secrets (never docs-only-skipped)
      run: python3 scripts/run-gitleaks --staged
    gitleaks-allowlist:   # G2 - the allowlist/baseline cannot quietly widen to swallow a secret
      run: python3 scripts/check-gitleaks-allowlist
    csp-capabilities:     # G47 - WebView CSP + Tauri capability lockdown (skips until P1's conf lands)
      run: python3 scripts/check-csp-capabilities
    # L1 gate slots (filled by their boxes): plan-lint --quiet on the docs glob (P0.3.5) /
    # G8 new-marker (P0.3.4) / clippy diff + tsc diff (P0.4).

commit-msg:        # L3 - fires at `git commit` (after pre-commit, before pre-push)
  commands:
    conventional:    # G11 - conventional-commit subject; lefthook passes the msg-file path as {1}
      run: python3 scripts/check-commit-msg {1}

pre-push:          # L2 - budget < 3 min; range / full-tree gates added per-box
  parallel: true
  commands:
    gate-plane-integrity:
      run: python3 scripts/check-gate-plane --pre-push
    l-neg1-ack:      # G71 - owner-ack on any L(-1)-touching commit in the push range (fail-soft in P0)
      run: python3 scripts/check-l-neg1-ack
    gitleaks:        # G2 - scan the unpushed range (the last local catch before a secret goes public)
      run: python3 scripts/run-gitleaks --range
    dual-review:     # G12 - the Dual-Review trailer on each unpushed non-check-off commit
      run: python3 scripts/check-dual-review
    # L2 gate slots (filled by their boxes): plan-lint full (P0.3.5) /
    # G8 + G70 full-tree (P0.3.4 / P0.3.14) / clippy --all-targets + tsc project (P0.4).
