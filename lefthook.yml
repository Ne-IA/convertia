# lefthook.yml - the L1/L2/L3 git-hook plane executor (P0.2.2).
#
# lefthook itself is pinned + checksum-verified via scripts/install-gate-tools
# (P0.2.1): a poisoned lefthook can silently no-op EVERY local hook (the
# core.hooksPath-bypass equivalent), so the G54 gate-plane-integrity check
# (scripts/check-gate-plane, P0.2.3) asserts the hooks are installed + not
# redirected on every run, and the L4 CI mirror re-invokes the same hooks.
#
# CHRONOLOGICAL PLANE <-> HOOK MAPPING (security-concept sec3):
#   pre-commit = L1  (fires at `git commit`;                  soft budget < 10 s; diff-scoped)
#   commit-msg = L3  (fires at `git commit`, BEFORE pre-push; conventional-commit + dual-review trailer)
#   pre-push   = L2  (fires at `git push`;                    budget < 3 min; range / full-tree)
# Stated explicitly so commit-msg (L3) is never wired into pre-push or omitted.
# commit-msg (L3) is DECLARED below as of P0.3.3 (G11 conventional-commit subject);
# G12 (the Dual-Review trailer) is the L2 pre-push half of the commit-hygiene plane.
#
# GATE SLOTS: each L1/L2/L3 gate is added to the slots below by the box that BUILDS
# it (so a gate is wired only after it is built + self-tested). The P0.3/P0.4 contract set is wired
# (plan-lint/G8/G70/rust-lint/unsafe-policy/fuzz-contract/ts-gate/english-only/coverage/lockfile-integrity/build-matrix/completeness/corpus-integrity —
# P0.3.5/3.4/3.14/4.1/4.2/4.3/4.7/4.6/4.8/4.9/4.10/4.11/5.4); later-phase gates add their own slots as they are built.
# The G29 Semgrep + shellcheck SAST gate is L4-only (CI `sast` job; semgrep is a CI pip tool).
#
# Requires Python 3.11+ on PATH as `python3` (the stdlib-only gate scripts) and
# the pinned tools installed under .gate-tools/bin (scripts/install-gate-tools).
# This file is L(-1) security-critical (scripts/l-neg1-files.toml, G71).

min_version: "2.1.9"
assert_lefthook_installed: true

pre-commit:        # L1 - soft budget < 10 s; diff-scoped gates added per-box
  parallel: true
  commands:
    gate-plane-integrity:
      run: python3 scripts/check-gate-plane
    gate-plane-config:
      run: python3 scripts/check-gate-planes
    gitleaks:        # G2 - scan the staged diff for the 3 CI secrets (never docs-only-skipped)
      run: python3 scripts/run-gitleaks --staged
    gitleaks-allowlist:   # G2 - the allowlist/baseline cannot quietly widen to swallow a secret
      run: python3 scripts/check-gitleaks-allowlist
    csp-capabilities:     # G47 - WebView CSP + Tauri capability lockdown (skips until P1's conf lands)
      run: python3 scripts/check-csp-capabilities
    deferral:        # G8 - NEW deferral/dead markers in the staged production diff (fail-open w/o base)
      run: python3 scripts/check-deferral --diff
    plan-lint:       # G7/G20 - doc-consistency (format + doc checks); --quiet, fast realtime pass
      run: python3 scripts/plan-lint --quiet
    supply-chain:    # G18 - cargo-deny/cargo-vet policy growth-guard (cargo-deny live P1.59; cargo-vet live run deferred P10.59)
      run: python3 scripts/check-supply-chain
    core-deps:       # G53 - the MIT core's dep closure excludes the image-worker copyleft C libs (T6; live P1)
      run: python3 scripts/check-core-deps
    js-supply-chain: # G18c/G18d - .npmrc registry pin + lifecycle lockdown (pnpm-lock URL guard live P1)
      run: python3 scripts/check-js-supply-chain
    repo-invariants: # G9 - repo-invariant grep gate (all invariants a-f LIVE over the real repo source since P1)
      run: python3 scripts/check-repo-invariants
    typos:           # G51 - prose typo gate (typos) over the public-facing-prose scope
      run: python3 scripts/run-typos
    editorconfig:    # G52 - EOL/charset/final-newline hygiene (editorconfig-checker + .editorconfig)
      run: python3 scripts/check-editorconfig
    test-suppression: # G70 - NEW test-suppression markers in the staged test diff (fail-open w/o base)
      run: python3 scripts/check-test-suppression --diff
    rust-lint-contract: # G3/G4 - rustfmt/clippy contract freeze + live fmt/clippy/test (live since P1)
      run: python3 scripts/check-rust-lint-contract
    unsafe-policy:   # G29 - #![deny(unsafe_code)] at every crate root + the one allow-listed FFI module (live since P1)
      run: python3 scripts/check-unsafe-policy
    fuzz-contract:   # G48/G16 - in-core fuzz-harness layout + per-numeric-IPC-arg overflow contract (target-absent until P3)
      run: python3 scripts/check-fuzz-contract
    ts-gate:         # G5/G6/G13 - tsconfig strict + eslint flat (no-any, fc.gen) + prettier/stylelint/vitest contract (live since P1)
      run: python3 scripts/check-ts-gate
    english-only:    # G57 - Principle-11 English-only: no i18n-runtime import + strings/ui.ts non-empty + no inline literal (live since P1)
      run: python3 scripts/check-english-only
    coverage:        # G27/G28 - coverage-floor freeze + increase-only decrease-guard (vs HEAD); per-domain/diff live in P1
      run: python3 scripts/check-coverage
    lockfile-integrity: # G18a - lockfile drift-set freeze + --locked/--frozen-lockfile flag contract; live git-diff drift-guard (CI flag-scan live since P1)
      run: python3 scripts/check-lockfile-integrity
    build-matrix:    # G30 - native-OS matrix + macOS-universal fat-Mach-O slice contract (sidecar slice-assertion target-absent until P1+)
      run: python3 scripts/check-build-matrix
    completeness:    # G22/G23 - format membership-parity bijection + every-`convert_*`-has-a-test walk (target-absent until P3/P4 handlers+corpus)
      run: python3 scripts/check-completeness
    corpus-integrity: # G24a - corpus SHA-256 manifest + provenance/licence + bijection + LFS-tracking governance (LIVE fail-closed since P3.30 - manifest.toml present)
      run: python3 scripts/check-corpus-integrity
    # L1 gate slots: the P0.4 contract set is wired; later phases add their own gate slots.
    # NOTE: the G29 Semgrep + shellcheck SAST gate (check-sast) is L4-only (the CI `sast` job) -
    # Semgrep is a CI-tier pip tool (requirements-ci.txt --require-hashes), not a locally pinned binary.

commit-msg:        # L3 - fires at `git commit` (after pre-commit, before pre-push)
  commands:
    conventional:    # G11 - conventional-commit subject; lefthook passes the msg-file path as {1}
      run: python3 scripts/check-commit-msg {1}

pre-push:          # L2 - budget < 3 min; range / full-tree gates added per-box
  parallel: true
  commands:
    gate-plane-integrity:
      run: python3 scripts/check-gate-plane --pre-push
    l-neg1-ack:      # G71 - owner-ack on any L(-1)-touching commit in the push range (fail-CLOSED from P1; --enforce wired P1.66)
      run: python3 scripts/check-l-neg1-ack --enforce
    gitleaks:        # G2 - scan the unpushed range (the last local catch before a secret goes public)
      run: python3 scripts/run-gitleaks --range
    dual-review:     # G12 - the Dual-Review trailer on each unpushed non-check-off commit
      run: python3 scripts/check-dual-review
    deferral:        # G21 - full production-tree deferral/dead-marker scan (fail-closed; no diff-base excuse)
      run: python3 scripts/check-deferral --full
    plan-lint:       # G7/G20 - full doc-consistency lint (all checks, fail-closed)
      run: python3 scripts/plan-lint
    supply-chain:    # G18/G18b - full supply-chain policy growth-guard (cargo-deny live P1.59; cargo-vet live run deferred P10.59)
      run: python3 scripts/check-supply-chain
    core-deps:       # G53 - core-crate forbidden-dependency walk (T6; live cargo metadata in P1)
      run: python3 scripts/check-core-deps
    js-supply-chain: # G18c/G18d - JS registry pin + lifecycle lockdown (pnpm-lock URL guard live P1)
      run: python3 scripts/check-js-supply-chain
    generated-drift: # G19 - regenerate codegen artifacts + git diff --exit-code (live since P1)
      run: python3 scripts/check-generated-drift
    test-suppression: # G70 - full-tree test-suppression-marker scan (fail-closed; no diff-base excuse)
      run: python3 scripts/check-test-suppression --full
    rs-test-refs:    # G73 - ipc/** contract-test-fn reference resolution (.rs analogue of G68; whole-tree, fail-closed)
      run: python3 scripts/check-rs-test-refs
    rust-lint-contract: # G14/G17 - whole-tree clippy --all-targets + cargo test + cargo audit (live since P1)
      run: python3 scripts/check-rust-lint-contract --full
    unsafe-policy:   # G29 - whole-tree #![deny(unsafe_code)] + exactly-one-FFI-module scan (live since P1)
      run: python3 scripts/check-unsafe-policy --full
    fuzz-contract:   # G48/G16 - whole-harness fuzz-target + fixture + bounds assertion (target-absent until P3)
      run: python3 scripts/check-fuzz-contract --full
    ts-gate:         # G5/G6/G13 - whole-project tsc --noEmit + eslint/stylelint/prettier --check + vitest (live since P1)
      run: python3 scripts/check-ts-gate --full
    english-only:    # G57 - whole-tree Principle-11 English-only / string-ownership scan (live since P1)
      run: python3 scripts/check-english-only --full
    coverage:        # G27/G28 - coverage-floor freeze + decrease-guard; per-domain/diff live in P1 (authoritative ratchet leg is the L4 workflow-security check)
      run: python3 scripts/check-coverage --full
    lockfile-integrity: # G18a - whole-tree lockfile-integrity contract: drift-set freeze + CI --locked/--frozen-lockfile flag-scan + git-diff drift-guard (live since P1)
      run: python3 scripts/check-lockfile-integrity
    build-matrix:    # G30 - build-matrix contract: native-OS set freeze + macOS-universal fat-Mach-O both-slice assertion (target-absent until a universal sidecar is staged)
      run: python3 scripts/check-build-matrix
    completeness:    # G22/G23 - schema/membership-parity bijection logic + every-`convert_*`-has-a-test git walk (target-absent until P3/P4)
      run: python3 scripts/check-completeness
    corpus-integrity: # G24a - whole-tree corpus integrity: SHA-256 manifest + provenance/licence + bijection + LFS-resolution governance (LIVE fail-closed since P3.30 - manifest.toml present)
      run: python3 scripts/check-corpus-integrity
    # L2 gate slots: the P0.4 contract set is wired; later phases add their own gate slots.
