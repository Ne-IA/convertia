# coverage-floors.toml — the G27 per-domain coverage-floor ratchet (P0.4.8). L(-1).
#
# INCREASE-ONLY: a commit that LOWERS any floor FAILS (check-coverage diffs the committed values against
# the prior commit's; a decrease reddens the build). A RAISE is a deliberate committed config change (the
# ratchet 50 % -> 70 %). Floors are never AVERAGED — G27 fails if ANY single domain is below its own floor.
#
# Created at 0 % in P0 (no coverage data exists until the P1 crates/packages land). Per-domain rows are
# ADDED as each Rust crate / TS package is authored in P1, each seeded at its first-measured floor and
# ratcheted up toward [meta].target_line_floor. The BRANCH-floor DOMAIN SET (the no-harm/detect kernel) is
# frozen in check-coverage (BRANCH_FLOOR_DOMAINS), not here — this file holds only the numeric floors.

[meta]
target_line_floor = 70    # the ratchet destination (start 50 -> 70); informational target, not a cap
diff_floor = 80           # G28: >= 80 % coverage on changed lines (red `main`)

# per-domain LINE-coverage floors — per product CRATE (Rust, cargo-llvm-cov --json) / the one `ui`
# package (TS, vitest v8 json-summary). Tooling (the `xtask` dev-bin, gate scripts) is EXCLUDED. Seeded
# in P1.54 from the first measured baseline, CONSERVATIVELY below the measured value so the cross-platform
# Linux Lane-A run (where the gate enforces) clears it with margin; the increase-only ratchet raises each
# toward [meta].target_line_floor as real code + tests land (the live `[G27] line …` print shows the
# observed CI value to ratchet from). Rows: convertia-core (the MIT host crate), convertia-imgworker (the
# isolated image-worker; a P1 stub at 0 %, ratchets in P4/P5), ui (the WebView frontend package).
[line]
convertia-core = 70
convertia-imgworker = 0
ui = 90

# BRANCH-coverage floors for the security-critical crates only — a guard that rejects `../` but not `..\`
# is 100 % LINE-covered by Unix-only tests yet misses the Windows branch. EMPTY in P1: Rust branch
# coverage needs nightly (`-Z coverage-options=branch`) and the BRANCH_FLOOR_DOMAINS modules
# (crate::detection / crate::fs_guard / crate::isolation) are P2/P3 security-kernel code — the rows are
# added when those modules + the nightly branch-coverage run land (the mapping is already wired in
# check-coverage). (TS branch coverage IS measured but is not floored here — no security-kernel TS.)
[branch]
