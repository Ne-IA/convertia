# tests/corpus/manifest.toml ‚Äî the ONE root corpus manifest (spec ¬ß6.4.5).
#
# One [[file]] row per fixture: `path` (relative to tests/corpus/), `sha256` (regenerated by
# scripts/stage-corpus, never hand-computed), `licence` (in public-domain/CC0/self-produced/synthetic),
# `provenance` (auditable source). G24a (check-corpus-integrity) verifies sha256 + licence + provenance +
# the bijection (every committed tests/corpus/ byte is manifested). `source` names the detected format
# where one exists; `covers`/`[file.expect]` (the ¬ß6.4.3a conversion-pair coupling the P4.60 bijection
# guard reads) are added by each pair's conversion box: the **CSV‚ÜîTSV** coupling is added HERE by P3.62
# (both directions, on every convertible row below); every OTHER pair's coupling arrives with its P4+
# conversion box. `ambiguous.csv` carries none ‚Äî it declines to Uncertain and backs no conversion pair.
#
# Layout: these first P3.30 detection-KAT fixtures live FLAT at the corpus root (¬ß6.4.5: "the
# per-source-format directory organisation is just file layout"); a per-source-format directory tier
# (spreadsheets/, images/, ‚Ä¶) becomes genuinely needed ‚Äî and is added with its ¬ß0.7 physical-tree update
# ‚Äî when the P4+ conversion corpus fills it with many files. [Build-Session-Entscheidung: P3.30]
#
# First live entries: P3.30 (the ¬ß1.2 detection walking-skeleton ‚Äî canonical CSV/TSV, a .csv that is
# really TSV (content over name), and a no-consistent-delimiter file that declines to Uncertain). Each is
# also pinned in tests/detect-kat.toml, read by the G15 detection KAT test.
#
# P3.61 adds the CSV‚ÜîTSV CONVERSION-pair fixtures (the ¬ß6.4.5 CSV/TSV edge set the slice's two pairs need)
# + the ¬ß0.9 timeout-sentinel. Their bytes are text-hygiene-EXEMPT by the 2026-07-17 owner ruling
# (`.editorconfig [tests/corpus/*.{csv,tsv}]` unsets all four axes; `.gitattributes ‚Ä¶ -text` pins
# byte-exactness) ‚Äî fixture bytes are the test subject, so no hygiene axis asserts anything about them.
# The exemption globs are FLAT + extension-pinned, which is a second reason the P3.30 flat layout above
# stands. This manifest file itself is first-party and deliberately stays under the global rules.
#
# P3.62 registers the CSV‚ÜîTSV coupling: every convertible row below carries `covers` (the ¬ß6.4.3a array
# form the P4.60 bijection guard parses) + a `[file.expect]` per-target outcome. **Disposition of the
# native CSV‚ÜîTSV pair** (the box's "byte-stable/lossy disposition"): (1) LOSSLESS ‚Äî a pure re-delimit +
# UTF-8 re-encode drops nothing (¬ß04 spreadsheets marks `CSV‚ÜîTSV` `‚úì`, never `‚úì~`), so every `[file.expect]`
# is `{ result = "success" }` with NO `lossy` key. (2) NOT a byte-stable round-trip pair ‚Äî the ¬ß3.5.6
# transform re-encodes to UTF-8 (no BOM) and RFC-4180 re-quotes (`QuoteStyle::Necessary`), so only a
# canonical minimal-quoting ASCII/LF input round-trips byte-for-byte; a cp1252 / UTF-16-BOM / extra-quoted
# input does not. The PAIR is therefore deliberately ABSENT from the G32 machine-enumerated
# lossless-round-trip set (that set is filled per byte-stable pair from P5.64+; adding CSV‚ÜîTSV there would
# fail G32 on the encoding-normalising fixtures). (3) DETERMINISTIC ‚Äî same source+settings twice yields a
# byte-identical output (`sha256(out1)==sha256(out2)`), asserted by the P3.62
# `engines::csv_tsv_corpus_binding` test for both output-format categories. The per-category determinism
# floor + a machine-readable enumeration land with the G32 gate that reads them (the P5.64+ pattern).
#
# Still no per-source-format subdirectory ‚Äî the P3 corpus stays FLAT (the P3.30 precedent); the first
# corpus-subdirectory box (P7.61, or P5 image staging if earlier) owns that re-organisation as a
# structural act (the ¬ß0.7 + ¬ß1a rows + the `.editorconfig`/`.gitattributes` glob extension in one
# owner-acked L(-1) commit).

