[[file]]
# §6.4.5 "UTF-16", the LE arm. [Build-Session-Entscheidung: P3.61] Both endiannesses ship as SEPARATE files:
# `classify_encoding` has two distinct BOM arms (`FF FE` / `FE FF`) and the §1.2 KATs pin them only at unit
# level — the corpus's job is the PAIR, so one file per arm leaves neither arm corpus-unvalidated. The BOM is
# mandatory: without one, `classify_encoding`'s NUL guard declines the file to NotText (a fail-clearly case,
# not the §6.4.5 sample). These are also the only fixtures bearing NUL bytes, so G52's checker skips them as
# binary and git's `text=auto` never touches them — the hygiene exemption covers them either way.
path = "utf16le_bom.csv"
