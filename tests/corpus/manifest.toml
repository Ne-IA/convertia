[[file]]
# The ¬ß0.9 TIMEOUT-SENTINEL for the P3 slice (¬ß0.9:1633 "a deterministic input / a `#[cfg(test)]` sidecar
# that reliably exceeds the budget or stalls without progress"), which `crate::pool`'s
# NATIVE_CSV_TSV_TIMEOUT doc names P3.61 as the author of.
#
# Its SIZE is load-bearing, not decorative. `transform_bytes` gates BOTH its progress tick and its
# cooperative-cancel poll behind `report_chunks = text_len >= PROGRESS_CHUNK_BYTES` (100 KiB) and then
# `position >= next_boundary && position < text_len`. Below that gate no poll ever runs, so a small
# fixture would have NO stall point and the sentinel would be inert. Fixed-width rows (a 14-byte header +
# 3328 √ó 32-byte rows = 106510 B, pure ASCII so the decoded length equals the byte length) make the
# crossing arithmetic rather than accidental: the boundary is first reached by record 3200 at position
# 102414, with 128 records still to come ‚Äî so the poll provably fires, on every machine.
#
# It is ALSO a well-formed CSV source, so P3.62 covers it as a CSV‚ÜíTSV pair fixture (the large-input
# reader-binding case): the output parses as RFC-4180, the source is unchanged, and the transform stays
# deterministic across the chunk-boundary path.
path = "expansion_sentinel.csv"
sha256 = "174181bdfac161554b85a89b9f985c6e3f444455f8b31fe2eea202d4cb35e0c9"
source = "CSV"
licence = "synthetic"
provenance = "self-produced"
covers = [["CSV", "TSV"]]
[file.expect]
"CSV‚ÜíTSV" = { result = "success" }

