# .github/workflows/ci.yml - Lane A: per-push validation on `main` (P0.2.4 - L4 - G25).
#
# The clean-checkout CI MIRROR of the local L1/L2 git-hook plane (security-concept §3;
# spec §6.7.1). Today it bootstraps + self-tests the pinned gate tooling on all three
# OS; the HEAVY GATES (clippy / tsc / gitleaks / plan-lint / ...) are added to the
# slots below by the box that builds each (P0.3 / P0.4) - the empty-but-wired skeleton.
#
# Runner-host [Build-Session-Entscheidung: P0.2.4]: the skeleton uses GitHub-HOSTED
# runners so it runs without the self-hosted-runner provisioning step; the §6.1.4
# self-hosted Linux Lane-A migration is a later infra step (P0.2.7). Third-party
# actions are SHA-PINNED (G50; the full token-scope/dependabot hardening is P0.2.6).
# This file is L(-1) security-critical (.github/**, scripts/l-neg1-files.toml).

name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 3 * * 1'   # weekly UI-drift canary for G56a (branch-protection / repo-config), P0.2.8

# Least privilege: the workflow GITHUB_TOKEN stays read-only (contents: read; G49/G56). G56a's
# branch-protection/repo-config reads need an admin scope no GITHUB_TOKEN can hold, so on push +
# schedule it runs --enforce with the separate fine-grained REPO_ADMIN_READ_TOKEN secret
# (Administration: Read, fail-CLOSED); fork-PRs (secrets withheld) stay fail-soft on the default
# token. Never set id-token on this push/PR workflow (P0.2.6).
permissions:
  contents: read

# Per-push/PR concurrency so a newer push supersedes an in-flight run. NEVER added to
# the release/tag workflow (P0.2.5).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate-tooling:
    name: gate-tooling
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30            # the P1.54 Linux coverage leg adds a SECOND (instrumented, separate target dir) Tauri-tree compile
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0          # full history so the P1.54 G28 diff-coverage leg can range github.event.before..HEAD
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'
      - name: Install + verify pinned gate tools
        run: python3 scripts/install-gate-tools
      # Tauri v2's gtk/webkit/soup/jsc/dbus `-sys` crates have build scripts that resolve their system
      # libraries via pkg-config, so the Linux leg needs the matching `-dev` packages to COMPILE (the ubuntu
      # leg first hit this once the P1.12 Tauri tree landed: "Package 'gdk-3.0' / 'pango' … not found").
      # macOS/Windows have WKWebView/WebView2 natively, so ONLY the Linux leg of this matrix compiles the
      # stack — this step is runner.os == 'Linux'-gated. The set is the EXACT compile closure, each package
      # traced to its Cargo.lock build-script consumer via `cargo tree -i … --target x86_64-unknown-linux-gnu`:
      #   libwebkit2gtk-4.1-dev        -> webkit2gtk-sys
      #   libgtk-3-dev                 -> gtk-sys/gdk-sys/pango-sys/cairo/atk/glib/gio/gdk-pixbuf/x11/wayland
      #   libsoup-3.0-dev              -> soup3-sys
      #   libjavascriptcoregtk-4.1-dev -> javascriptcore-rs-sys
      #   libdbus-1-dev                -> libdbus-sys (<- dbus <- tao)
      # (libgtk-3-dev/libsoup-3.0-dev/libjavascriptcoregtk-4.1-dev are also apt-Depends of
      # libwebkit2gtk-4.1-dev — named explicitly for robustness against upstream repackaging + the per-crate
      # self-documentation above; libdbus-1-dev is the only one NOT pulled transitively.)
      # This job only COMPILES + tests (clippy --all-targets + cargo test); it never bundles or runs the
      # app, so the §6.1.4 release-runner's RUNTIME/BUNDLE deps (librsvg2-dev, patchelf, FUSE 2) and the
      # dlopen'd tray (libappindicator-sys uses the libloading crate; x11-dl its own dlopen/libc wrapper —
      # neither needs a build-time `-dev`) are deliberately NOT installed here. These are CI build-ENVIRONMENT deps, NOT shipped/trust-bearing (the portable
      # AppImage bundles/locates its own WebKitGTK, §6.1/§0.3.1), so they track the runner image rather than
      # the pinned gate-tool/engine set; webkit2gtk-4.1 = the §0.3.1 Ubuntu-22.04 floor. The Linux-CI
      # analogue of the local MSVC/WebView2 dev runway. Positioned here in the environment-setup block so it
      # precedes EVERY Rust-compiling step below — the G19 `cargo run -p xtask -- codegen` regen (live since
      # P1.28), the G3/G4 rust-lint contract, and any live-Rust gate self-test in the G10 canary — each of
      # which compiles the Tauri-dependent convertia-core and so needs this stack on PATH.
      - name: 'Tauri v2 Linux compile deps (webkit2gtk-4.1 / gtk-3 / soup-3 / jsc-4.1 / dbus -sys stack)'
        if: runner.os == 'Linux'
        run: |
          # retry apt-get update so a transient Ubuntu-mirror hiccup does not spuriously red `main`
          for i in 1 2 3; do sudo apt-get update && break; echo "apt-get update failed; retry $i"; sleep 5; done
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev
      # Node + pnpm via corepack (the runner ships Node; corepack activates the pinned pnpm@10.13.1 from
      # package.json's packageManager). Linux-only: the §6.7.1 JS legs (tsc/eslint/stylelint/prettier/
      # vitest + vitest-axe) are OS-agnostic, so they run ONCE on the Linux leg — populating node_modules
      # here is what flips check-ts-gate's pnpm-guarded live tier from skip-with-notice to live (P1.51).
      # No setup-node action: Node is runner-provided and no Node version is pinned (§0.8 pins only pnpm),
      # so corepack + the runner Node is the minimal-surface choice (no new SHA-pinned Marketplace action).
      - name: 'Node/pnpm toolchain via corepack (Linux — wakes the §6.7.1 JS live legs)'
        if: runner.os == 'Linux'
        run: |
          corepack enable pnpm
          pnpm install --frozen-lockfile
      # G10 continuous-armed-canary (P0.2.13): one auto-discovering prelude runs EVERY gate-script
      # self-test (the g24-*/g54-* planted-positives + the test-*-fastpath-pattern smoke tests) on
      # all three OS, so a pinned-tool bump that breaks a stable script's parsing - or a new gate
      # whose self-test was never wired here - is caught. Replaces the former per-self-test steps.
      - name: 'G10: continuous-armed-canary — run EVERY gate-script self-test (P0.2.13 prelude)'
        run: python3 scripts/run-gate-selftests --require-network
      - name: 'G54b: defense-in-depth plane-config integrity (gate-planes.toml)'
        run: python3 scripts/check-gate-planes
      - name: 'G2: gitleaks secrets scan — full working tree (clean-checkout dir mode)'
        run: python3 scripts/run-gitleaks --dir
      - name: 'G2: gitleaks allowlist/baseline growth-guard'
        run: python3 scripts/check-gitleaks-allowlist
      - name: 'G47: WebView CSP + Tauri capability structural lint'
        run: python3 scripts/check-csp-capabilities
      - name: 'G21: deferral / dead-marker scan — full production tree (fail-closed)'
        run: python3 scripts/check-deferral --full
      - name: 'G7/G20: plan-lint / spec-lint doc-consistency (all checks, full)'
        run: python3 scripts/plan-lint
      - name: 'G18/G18b: supply-chain policy growth-guard (cargo-deny live P1.59; cargo-vet config now, live run deferred to P10.59)'
        run: python3 scripts/check-supply-chain
      - name: 'G53: core-crate forbidden-dependency walk (image-worker copyleft excluded from the MIT core; live P1)'
        run: python3 scripts/check-core-deps
      - name: 'G18c/G18d: JS/WebView supply-chain posture (.npmrc registry pin + lifecycle lockdown; pnpm-lock guard live P1)'
        run: python3 scripts/check-js-supply-chain
      - name: 'G19: generated-artifact drift-check framework (regen + git diff --exit-code; targets registered in P1)'
        run: python3 scripts/check-generated-drift
      - name: 'G9: repo-invariant grep gate (all invariants a-f LIVE over the real repo source since P1)'
        run: python3 scripts/check-repo-invariants
      - name: 'G51: prose typo gate (typos over the public-facing-prose scope; .typos.toml allowlist)'
        run: python3 scripts/run-typos
      - name: 'G52: EOL/charset/final-newline hygiene (editorconfig-checker + committed .editorconfig)'
        run: python3 scripts/check-editorconfig
      - name: 'G70: test-suppression-marker scan — full test tree (no green-by-rewrite; live over the committed fixture crates, grows from P1)'
        run: python3 scripts/check-test-suppression --full
      # P1.59 G17: warm the RustSec advisory-db so the `cargo audit --no-fetch` leg in the
      # check-rust-lint-contract step below is LIVE (a clean runner ships the pinned cargo-audit but no db).
      # Linux-only - the audit reads the OS-agnostic Cargo.lock, so it runs once (on macOS/Windows the db
      # is absent and the G17 leg skips-with-notice). A fresh shallow clone each run pulls the latest
      # advisories (a NEW one not in audit.toml then reddens the gate); the 18 accepted ids are reconciled
      # across deny.toml + audit.toml (the G18 two-scanner check).
      - name: 'P1.59 G17: warm the RustSec advisory-db (Linux; OS-agnostic over Cargo.lock)'
        if: runner.os == 'Linux'
        # 3-try retry (same convention as the apt-get step) so a transient GitHub/CDN hiccup does not
        # spuriously red main; rm -rf before each attempt clears a partial clone; fail-CLOSED (exit 1) if
        # all three fail, so the G17 leg never runs against an empty/partial db.
        run: |
          db="${CARGO_HOME:-$HOME/.cargo}/advisory-db"
          for i in 1 2 3; do
            rm -rf "$db"
            git clone --depth 1 https://github.com/rustsec/advisory-db "$db" && exit 0
            echo "advisory-db clone failed; retry $i"; sleep 5
          done
          echo "advisory-db clone failed after 3 attempts" >&2; exit 1
      - name: 'G3/G4/G14/G17: Rust lint/format/test/audit contract (rustfmt/clippy policy frozen; live fmt/clippy/test/audit in P1)'
        run: python3 scripts/check-rust-lint-contract --full
      - name: 'G29: unsafe-policy gate (#![deny(unsafe_code)] + one allow-listed FFI module; cross-platform, live deny/allow scan in P1)'
        run: python3 scripts/check-unsafe-policy --full
      - name: 'G48/G16: in-core fuzz-harness + per-numeric-IPC-arg overflow contract (frozen target/bounds/fixture set + date-pinned nightly; live harness in P3)'
        run: python3 scripts/check-fuzz-contract --full
      - name: 'G5/G6/G13: TypeScript lint/type-check/format/test contract (tsconfig strict + eslint no-any/fc.gen + prettier/stylelint/vitest frozen; live tsc/eslint/prettier/vitest in P1)'
        run: python3 scripts/check-ts-gate --full
      # P1.56 §6.7.1 step-4b: the ATTRIBUTABLE automated-a11y (vitest-axe jsdom) leg (G33a) — asserts
      # ARIA-role/state validity + focus-order over the rendered React tree (NOT colour contrast, which
      # jsdom cannot compute — that is the Lane-B headed @axe-core/webdriverio leg, §6.4.6a). Its OWN step
      # (running the *.a11y.test.* subset via vitest.a11y.config.ts, excluded from the general G5/G6/G13
      # vitest run) so an a11y regression is a distinct, attributable G33a red. Linux-only — vitest is
      # OS-agnostic + needs the Linux-gated node_modules (P1.51), like the other JS legs.
      - name: 'G33a: automated a11y (vitest-axe jsdom; ARIA/role/state + focus-order, not contrast)'
        if: runner.os == 'Linux'
        run: pnpm run test:a11y
      - name: 'G57: Principle-11 English-only / string-ownership lint (no i18n-runtime import + strings/ui.ts non-empty + no inline literal; live in P1)'
        run: python3 scripts/check-english-only --full
      # P1.52.3 §6.7.1 step-1 YAML/config-hygiene leg: yamllint over .github/ + the root config YAML
      # (structure / indentation / key-duplication; ruleset .yamllint). Distinct from actionlint (G49,
      # workflow semantics), zizmor (G50, workflow security) and editorconfig-checker (G52, EOL/charset).
      # Linux-only — YAML lint is OS-agnostic so it runs once; yamllint is hash-pinned in
      # requirements-yamllint.txt (--require-hashes). No Gnn of its own (a config-hygiene linter).
      # The scope is EXPLICIT paths (not a glob): it deliberately excludes the generated pnpm-lock.yaml
      # and the vendored scripts/semgrep-rules/ Semgrep DSL (third-party, self-validated by Semgrep).
      - name: 'P1.52.3 §6.7.1: yamllint — YAML/config-hygiene over .github/ + config YAML'
        if: runner.os == 'Linux'
        run: |
          python3 -m pip install --require-hashes -r requirements-yamllint.txt
          python3 -m yamllint -c .yamllint .github/ lefthook.yml pnpm-workspace.yaml .yamllint
      # P1.54 §6.7.1 step-3: generate the coverage reports the G27 per-domain + G28 diff live tiers read.
      # Linux-only — §6.7.1 runs the OS-agnostic test leg on the Linux runner (only compile-sanity fans to
      # the matrix), so coverage is measured once on Linux. cargo-llvm-cov is already on PATH (the bare
      # install-gate-tools above installs every pinned tool) + llvm-tools-preview ships via
      # rust-toolchain.toml (P1.3). `--no-report` runs the instrumented `cargo test` ONCE, then two cheap
      # `report` passes emit the JSON (per-domain, G27) + lcov (per-line, G28 diff). Branch coverage needs
      # nightly (`-Z coverage-options=branch`) so it is NOT requested here — Rust branch floors land in
      # P2/P3 with the security kernel + the nightly run (the [branch] table is empty until then). The TS
      # `test:coverage` script emits coverage/coverage-summary.json (per-domain) + coverage/lcov.info (diff).
      - name: 'P1.54 §6.7.1 step-3: generate coverage reports (Rust cargo-llvm-cov + Vitest v8) — Linux'
        if: runner.os == 'Linux'
        run: |
          export PATH="$PWD/.gate-tools/bin:$PATH"
          # cargo llvm-cov report --output-path does NOT create the parent dir; create it first (the
          # --no-report run only makes target/llvm-cov-target/, not the report dir target/llvm-cov/).
          mkdir -p target/llvm-cov
          # --locked: the instrumented build must NOT re-resolve / mutate the committed Cargo.lock (the
          # G18a drift-guard runs right after — a mutated lockfile would red main; §0.8 pin-everything).
          cargo llvm-cov --workspace --locked --no-report
          cargo llvm-cov report --json --output-path target/llvm-cov/coverage.json
          cargo llvm-cov report --lcov --output-path target/llvm-cov/coverage.lcov
          pnpm run test:coverage
      - name: 'G27: coverage-floor contract — freeze (all OS) + per-domain LINE floors live over cargo-llvm-cov/vitest (Linux, P1.54); the increase-only ratchet is the workflow-security leg'
        run: python3 scripts/check-coverage --full
      # P1.54 G28: changed-lines diff coverage over the push range — Linux (the report-bearing leg) + push
      # only (the build-loop's commits; the floors are empty-of-diff on a fork-PR / first push). Needs the
      # full history (fetch-depth: 0 above) to range github.event.before..HEAD; fail-OPEN if the base does
      # not resolve (all-zeros / force-push). BEFORE via env (not inline) to avoid template-injection (G50).
      - name: 'G28: changed-lines diff coverage over the push range (Linux report-bearing leg, push only)'
        if: runner.os == 'Linux' && github.event_name == 'push'
        env:
          BEFORE: ${{ github.event.before }}
        run: python3 scripts/check-coverage --base "$BEFORE"
      - name: 'G18a: lockfile-integrity contract — drift-set freeze + --locked/--frozen-lockfile flag-scan + git diff --exit-code drift-guard (live drift-guard; CI flag-scan live since P1 — build commands landed)'
        run: python3 scripts/check-lockfile-integrity
      - name: 'G30: build-matrix contract — native-OS set freeze + macOS-universal fat-Mach-O both-slice assertion (stdlib fat-header parse; sidecar slice-assertion target-absent until P1+ stage-engines)'
        run: python3 scripts/check-build-matrix
      - name: 'G22/G23: completeness — format membership-parity bijection logic + every-`convert_*`-has-a-test git walk (target-absent until P3/P4 handlers+corpus; §04↔registry↔corpus bijection is the P4.60 Rust guard)'
        run: python3 scripts/check-completeness
      - name: 'G24a: corpus / crash-fixture integrity — SHA-256 manifest + provenance/licence + bijection + LFS-resolution governance (.gitattributes/.lfsconfig); target-absent until the corpus fills P3-P7'
        run: python3 scripts/check-corpus-integrity
      # --- L4 heavy-gate slots (mirror the local L1/L2 plane); each filled by its box ---
      #   (G68 doc-graph + G69 struct-map run inside the plan-lint step above as checks 25/26.)
      #   The structural-freeze contracts above (rust-lint / unsafe-policy / ts-gate / coverage /
      #   lockfile-integrity / supply-chain) become LIVE tool runs in P1 once the lockfiles + crates
      #   exist: cargo-deny check + cargo-vet --locked check + cargo-audit + clippy --all-targets +
      #   tsc + eslint (P0.4 contract set, activated in P1; the G18a flag-scan + drift-guard fail-close
      #   the moment a build command / lockfile lands).

  workflow-security:
    name: workflow-security
    runs-on: ubuntu-22.04           # OS-independent audit; Linux-only saves macOS minutes (G56 cost discipline)
    timeout-minutes: 10
    steps:
      # This job reads the REPO_ADMIN_READ_TOKEN secret (G56a --enforce), so G56 requires an
      # unconditional harden-runner in egress-BLOCK mode: a compromised step cannot exfiltrate the
      # secret to an off-allowlist host. allowed-endpoints = checkout/gh-api + the GitHub release
      # CDNs the pinned gate-tool binaries (actionlint/zizmor) + setup-python download from.
      - name: 'Harden the runner — egress block (this job reads a secret; G56)'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            codeload.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0          # full history so G71 can range from github.event.before..HEAD
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'
      - name: Install + verify pinned workflow tools (actionlint, zizmor)
        run: python3 scripts/install-gate-tools --tool actionlint --tool zizmor
      - name: 'G49: actionlint over .github/workflows'
        run: .gate-tools/bin/actionlint
      - name: 'G50: zizmor workflow security audit (offline, regular persona)'
        run: .gate-tools/bin/zizmor --offline --persona regular .github/workflows/
      - name: 'G56: CI supply-chain config hygiene (dependabot 4-eco, id-token, concurrency polarity, timeouts, perms)'
        run: python3 scripts/check-ci-supply-chain
      # G56a fail-CLOSED on trusted events (push + schedule) via the fine-grained admin-READ PAT
      # (REPO_ADMIN_READ_TOKEN — the default GITHUB_TOKEN holds no admin scope); fork-PRs (GitHub
      # withholds secrets from fork-triggered runs) stay fail-soft on the default token, which loses
      # nothing — a code PR cannot alter the repo rulesets, and the config-change path (push to main)
      # + the weekly schedule canary BOTH --enforce. (G56a CI path: fail-soft -> fail-closed.)
      - name: 'G56a: branch-protection / repo-config — fail-CLOSED (push + schedule; admin-read PAT)'
        if: github.event_name != 'pull_request'
        run: python3 scripts/check-branch-protection --enforce
        env:
          GH_TOKEN: ${{ secrets.REPO_ADMIN_READ_TOKEN }}
      - name: 'G56a: branch-protection / repo-config — fail-soft (fork-PR; secrets withheld)'
        if: github.event_name == 'pull_request'
        run: python3 scripts/check-branch-protection
        env:
          GH_TOKEN: ${{ github.token }}
      - name: 'G71: L(-1)-ack change-control over the push range (fail-CLOSED, P1.66; --enforce)'
        env:
          BEFORE: ${{ github.event.before }}   # via env (not inline) to avoid template-injection (G50/zizmor)
        run: python3 scripts/check-l-neg1-ack --base "$BEFORE" --enforce
      - name: 'G12: Dual-Review trailer over the push range (L4 mirror of the L2 pre-push gate)'
        if: github.event_name == 'push'        # build-loop commits only; fork-PR commits carry no trailer
        env:
          BEFORE: ${{ github.event.before }}   # via env (not inline) to avoid template-injection (G50/zizmor)
        run: python3 scripts/check-dual-review --base "$BEFORE"
      - name: 'G11: conventional-commit subject over the push range (L4 mirror of the L3 commit-msg gate)'
        if: github.event_name == 'push'        # build-loop commits only; fork-PR subjects are squash-normalised on merge
        env:
          BEFORE: ${{ github.event.before }}   # via env (not inline) to avoid template-injection (G50/zizmor)
        run: python3 scripts/check-commit-msg --base "$BEFORE"
      - name: 'G27: coverage-floor increase-only decrease-guard over the push range (the authoritative ratchet leg; needs full history)'
        if: github.event_name == 'push'        # the floors are empty in P0 (no-op) + fail-closes the moment a floor lands in P1
        env:
          BEFORE: ${{ github.event.before }}   # via env (not inline) to avoid template-injection (G50/zizmor)
        run: python3 scripts/check-coverage --base "$BEFORE"
      # NOTE: the g24-*/g54-* self-tests for these gates (ci-supply-chain, release-tag-trust,
      # branch-protection) run in the gate-tooling job's G10 continuous-armed-canary prelude
      # (3-OS), not here — one auto-discovering runner is the single source of self-test truth.

  sast:
    name: sast
    runs-on: ubuntu-22.04           # Semgrep is a Linux SAST source-scan (OS-independent findings); ubuntu-only saves macOS/Windows minutes (G56 cost discipline)
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: '3.12'
      - name: Install + verify the pinned SAST tools (Semgrep via pip --require-hashes; shellcheck pinned)
        # --require-hashes installs Semgrep + its FULL transitive tree, every wheel hash-verified
        # (requirements-ci.txt, G29/§0). shellcheck is the gate-tools.toml binary pin.
        run: |
          python3 -m pip install --require-hashes -r requirements-ci.txt
          python3 scripts/install-gate-tools --tool shellcheck
      - name: 'G29: SAST — armed-canary prelude (planted-positives) → semgrep --validate → scan (vendored rulesets, offline) → shellcheck'
        run: python3 scripts/check-sast --full

  # §6.7.1 step-5 compile-sanity (G30, P1.58): prove the app COMPILES + LINKS as a Tauri app on all three
  # OS — the "empty window builds on 3 OS from clean checkout" proof. The live counterpart to the P0 G30
  # build-matrix CONTRACT (check-build-matrix, in gate-tooling, which only FREEZES the native-OS/arch set);
  # this job proves the set actually builds. Distinct from the gate-tooling gate-script mirror (which
  # lint/test-COMPILES the crates via clippy --all-targets) — `tauri build` additionally embeds the Vite
  # frontend (frontendDist: ../dist) + links the app binary, which clippy does not exercise. Its own job
  # (not gate-tooling steps) because it needs pnpm on ALL 3 OS for the per-OS build, whereas gate-tooling's
  # pnpm is Linux-only for the OS-agnostic JS lint. No secret is read → per G56 no harden-runner is needed
  # (same posture as gate-tooling; the crates.io/npm fetch is dev-tooling, not a runtime/product egress).
  compile-sanity:
    name: compile-sanity
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25            # a debug tauri build compiles the ~382-crate Tauri tree per OS (cold)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: 'Node/pnpm toolchain via corepack (all 3 OS — the per-OS tauri build needs the frontend)'
        run: corepack enable pnpm
      # The Tauri v2 gtk/webkit/soup/jsc/dbus `-sys` crates resolve their system libs via pkg-config, so the
      # Linux leg needs the matching `-dev` packages to COMPILE (the same compile closure as gate-tooling;
      # macOS/Windows have WKWebView/WebView2 natively). `--no-bundle` means the AppImage RUNTIME/bundle deps
      # (librsvg/patchelf/FUSE) are NOT needed here.
      - name: 'Tauri v2 Linux compile deps (webkit2gtk-4.1 / gtk-3 / soup-3 / jsc-4.1 / dbus -sys stack)'
        if: runner.os == 'Linux'
        run: |
          for i in 1 2 3; do sudo apt-get update && break; echo "apt-get update failed; retry $i"; sleep 5; done
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev
      - name: Install JS deps (frozen lockfile)
        run: pnpm install --frozen-lockfile
      # The debug `tauri build` embeds frontendDist: ../dist at compile time + has NO beforeBuildCommand, so
      # the Vite build (-> ../dist) MUST run first. `--no-bundle` = compile + LINK the app binary (the
      # compile-sanity proof), skipping the installer packaging (WiX/NSIS/dmg/AppImage) which is the
      # P10/Lane-B release concern. The crate-level `cargo check` the §6.7.1 step names is already covered
      # by the G3/G4 `clippy --all-targets` leg in gate-tooling; this step adds the Tauri app build clippy
      # does not exercise. [Build-Session-Entscheidung: P1.58 — --no-bundle for compile-sanity scope.]
      - name: 'P1.58 G30: compile-sanity — vite build + debug tauri build (compile + link, no installer)'
        run: |
          pnpm build
          pnpm tauri build --debug --no-bundle
