# .github/workflows/fuzz.yml — the G48 instrumented-nightly in-core fuzz legs (P3.73; L(-1), owner-acked).
#
# WHAT: the coverage-guided libFuzzer runs over the four buildable in-core untrusted-byte targets
# (detect / fs_guard_resolve_identity / fs_guard_is_safe_output / csv_tsv — the frozen G48_FUZZ_TARGETS
# keys, check-fuzz-contract; zip_slip + imgworker_ffi join at P7.50.1 / P4.35.1 per-target dormancy).
# Linux + macOS ONLY (spec §6.4.2 / the G48 row: libFuzzer is constrained to where it is reliable);
# the per-push / all-platform (incl. Windows) coverage is the STABLE-toolchain `crate::fuzz_replay`
# corpus replay (P3.67) + the `crate::fuzz_bounds` fixture-content tests — never an instrumented
# Windows build.
#
# WHY nightly-scheduled, not per-push: an instrumented -max_total_time=300s × 4-target run is a
# budgeted background sweep (G56 cost discipline), and a fuzz FINDING is a committed artifact
# (fuzz/crashes/ + the stable replay pins it), not a push-blocking gate.
#
# PINS (security-concept §0 pin-and-verify):
#   - toolchain: the DATE-pinned `nightly-2026-07-14` = gate-tools.toml [toolchain] fuzz_nightly —
#     invoked as `cargo +nightly-2026-07-14 fuzz` (check-ci-supply-chain check (7) asserts the literal
#     date form AND cross-checks it against the committed pin).
#   - cargo-fuzz 0.13.2 via `cargo install --version 0.13.2 --locked` — crates.io is content-addressed
#     (cargo verifies the crate archive's sha256 against the registry index at install), so the
#     version pin + --locked IS the checksum leg here; upstream rust-fuzz/cargo-fuzz publishes NO
#     prebuilt binaries, so the gate-tools.toml binary-download pattern does not apply (recorded in
#     gate-tools.toml's growth comment). Corroborated 2026-07-21: crates.io lists 0.13.2 (2026-06-09)
#     as current; the rust-fuzz/cargo-fuzz CHANGELOG names the same version. Established by Co-Pilot,
#     owner-acked (the P3.73 L(-1) tail).
#   - libFuzzer resource bounds: sourced from the committed fuzz/libfuzzer-bounds.txt (G48 — an
#     OOM/timeout is a REPORTED finding, never a runner kill; check-fuzz-contract asserts the four
#     bound names live in a committed fuzz config, never inline-only CLI args).
#   - sanitizer split (the 2026-07-22 owner-ruled G48 refinement; gate-status.md G48 entry): Linux
#     runs FULL ASAN (`-s address`, explicit — never silently dropped); macOS runs SANITIZER-LESS
#     coverage-guided (`-s none`, still sancov-instrumented: panics/hangs/OOMs stay the oracle) —
#     ASAN on aarch64-apple-darwin is upstream-broken for BOTH linkers, proven empirically in the
#     P3.73 rounds 3-6: ld-prime rejects the instrumented rlibs at LINK (`initializer pointer has
#     no target`; deployment-target 12.0 refuted), and under -ld_classic the ASAN RUNTIME SEGVs at
#     process start (flockfile, from dyld start) on nightly-2026-06-16 AND -07-14 (compiler-rt
#     variation refuted; rust#101247 #121624 #146367). The per-run ASAN CANARY below is the
#     self-healing re-arm: its first green run emits a ::warning:: annotation = the loud signal to
#     restore `-s address` on macOS (nothing is parked on a prose reminder).
#
# FINDINGS: a crash/OOM/timeout fails the job; the minimized artifact under fuzz/artifacts/ is dumped
# base64 into the job log (NO upload-artifact action — deliberately zero new SHA-pinned action
# surfaces; -max_len=1 MiB bounds the dump) and is then committed under fuzz/crashes/ by the fixing
# box, where the P3.67 stable replay pins it forever (the G48 crash-corpus discipline).
#
# This job reads NO secrets (check (6): non-secret jobs are host-unconstrained; the fuzz plane and
# the future signing job stay on disjoint hosts by construction).

name: fuzz

on:
  schedule:
    - cron: '23 1 * * *' # daily instrumented sweep, 01:23 UTC (offset minutes — GitHub thundering-herd guidance)
  workflow_dispatch: # manual re-run (e.g. re-driving a finding)

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    name: fuzz (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 80 # G56 outer wall-clock cap: 4 targets × -max_total_time=300 s + the cold instrumented compile of the Tauri tree + the macOS ASAN-canary's second (differently-flagged) compile
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # G18a leg (D) pre-flight, BEFORE the expensive installs + instrumented sweep: the committed
      # fuzz/Cargo.lock must (a) satisfy the fuzz manifest AS-IS (`--locked` - cargo would otherwise
      # silently re-resolve at build time) and (b) stay version-synced to the root Cargo.lock (the
      # check-lockfile-integrity sub-workspace leg - a self-consistent but root-drifted lock builds
      # fine yet fuzzes a dependency closure the product does not ship; the 2026-07-22 finding).
      # `working-directory` (not `--manifest-path fuzz/Cargo.toml`) keeps the cargo segment free of
      # an incidental `fuzz` token - G56 check (7) deliberately over-rejects any `cargo … fuzz`
      # segment lacking the date-pinned channel, and a metadata call is not a fuzz invocation.
      - name: 'G18a: the committed sub-workspace lockfile satisfies its manifest as-is (--locked)'
        working-directory: fuzz
        run: cargo metadata --locked --format-version 1 > /dev/null
      # the gate script needs tomllib (Python >= 3.11); ubuntu-22.04's system python3 is 3.10, so the
      # SAME SHA-pinned setup-python@3.12 every other python-invoking workflow uses is mandatory here
      # (the R1 sonnet P0 - local green on 3.13 masked the runner's 3.10).
      - name: 'Python 3.12 for the stdlib gate scripts (tomllib >= 3.11)'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: 'G18a: the sub-workspace lockfile is version-synced to the root Cargo.lock (leg D)'
        run: python3 scripts/check-lockfile-integrity

      # The fuzz targets path-dep on convertia-core (the lib), whose compile closure is the same as
      # compile-sanity's: the Tauri v2 gtk/webkit/soup/jsc/dbus -sys crates resolve system libs via
      # pkg-config on Linux (macOS has WKWebView natively), and the tauri context needs the JS deps
      # installed (the proven-green gate-tooling/compile-sanity preamble, mirrored verbatim).
      - name: 'Tauri v2 Linux compile deps (webkit2gtk-4.1 / gtk-3 / soup-3 / jsc-4.1 / dbus -sys stack)'
        if: runner.os == 'Linux'
        run: |
          for i in 1 2 3; do sudo apt-get update && break; echo "apt-get update failed; retry $i"; sleep 5; done
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libdbus-1-dev
      - name: 'Node/pnpm toolchain via corepack'
        run: corepack enable pnpm
      - name: Install JS deps (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: 'Install the date-pinned fuzz nightly (= gate-tools.toml [toolchain] fuzz_nightly)'
        run: rustup toolchain install nightly-2026-07-14 --profile minimal

      - name: 'Install cargo-fuzz 0.13.2 (crates.io index-checksum-verified by cargo; no prebuilt upstream binaries exist)'
        run: cargo install cargo-fuzz --version 0.13.2 --locked

      - name: 'G48: run the four in-core targets (ASAN explicit; bounds from the committed fuzz/libfuzzer-bounds.txt)'
        env:
          # macOS leg only (empty on Linux): Apple's ld-prime rejects the ASAN-instrumented rlibs with
          # `ld: initializer pointer has no target` (first victim: tauri_utils's cgu) - the known
          # sanitizer-module-ctor x -dead_strip class on aarch64-apple-darwin. Empirics (2026-07-22,
          # rounds 3+4): MACOSX_DEPLOYMENT_TARGET=12.0 (the chained-fixups hypothesis) did NOT cure it -
          # the round-4 link line carried -mmacosx-version-min=12.0.0 and failed identically, so that
          # env was REMOVED as demonstrably ineffective. The classic linker sidesteps the ld-prime
          # initializer handling entirely (the canonical rust-fuzz workaround). -ld_classic is
          # Apple-deprecated: when a future runner-image Xcode drops it, this leg fails LOUDLY at link
          # and the pin is revisited (fail-loud beats ASAN-off - the rejected alternative would silently
          # weaken the only macOS memory-error oracle). cargo-fuzz APPENDS its sanitizer RUSTFLAGS to
          # this env value, so the link-arg and the ASAN instrumentation compose.
          RUSTFLAGS: ${{ runner.os == 'macOS' && '-Clink-arg=-Wl,-ld_classic' || '' }}
          # the header's sanitizer split: Linux = full ASAN; macOS = sanitizer-less coverage-guided
          # (sancov stays on; -ld_classic stays - the sancov module-ctors hit the same ld-prime
          # initializer rejection the ASAN ones did).
          SAN: ${{ runner.os == 'macOS' && 'none' || 'address' }}
        run: |
          BOUNDS="$(grep -v '^#' fuzz/libfuzzer-bounds.txt | xargs)"
          echo "libFuzzer bounds: ${BOUNDS} | sanitizer: ${SAN}"
          for t in detect fs_guard_resolve_identity fs_guard_is_safe_output csv_tsv; do
            echo "::group::fuzz ${t}"
            # shellcheck disable=SC2086  # ${BOUNDS} is a deliberately word-split flag list (one committed source file, no user input)
            cargo +nightly-2026-07-14 fuzz run "${t}" -s "${SAN}" -- ${BOUNDS}
            echo "::endgroup::"
          done

      # The self-healing ASAN re-arm canary (macOS only; the 2026-07-22 G48 refinement's second
      # half): every nightly run ATTEMPTS one short full-ASAN target. While upstream stays broken
      # it fails INSIDE the wrapper (exit 0 - the leg stays green; the expected-broken note is
      # printed). The FIRST run where it succeeds emits a ::warning:: annotation on the run summary
      # - the loud, mechanical signal that aarch64-apple-darwin ASAN healed and the main step's
      # `SAN` split must be reverted to full `-s address` (this canary then retires). Budgeted: one
      # target, -max_total_time=30, the second instrumented compile is inside the raised
      # timeout-minutes cap.
      - name: 'ASAN re-arm canary (expected-fail while upstream is broken; green => ::warning:: re-arm signal)'
        if: runner.os == 'macOS'
        env:
          RUSTFLAGS: '-Clink-arg=-Wl,-ld_classic'
        run: |
          # `|| true`: the canary must NEVER red the leg - even a hypothetically all-comment bounds
          # file (pipefail would kill a bare assignment) degrades to an empty list here, and the
          # explicit -max_total_time=30 below keeps the attempt bounded regardless (the MAIN sweep's
          # unguarded twin of this line SHOULD red on that shape - G48 asserts the committed bounds).
          BOUNDS="$(grep -v '^#' fuzz/libfuzzer-bounds.txt | xargs || true)"
          # shellcheck disable=SC2086  # ${BOUNDS} is the same deliberately word-split committed flag list; the trailing -max_total_time=30 overrides only the time budget (libFuzzer last-flag-wins)
          if cargo +nightly-2026-07-14 fuzz run detect -s address -- ${BOUNDS} -max_total_time=30; then
            echo "::warning title=ASAN healed on aarch64-apple-darwin::The macOS ASAN canary ran green - restore -s address on the macOS fuzz leg (revert the SAN split; see the G48 gate-status entry, 2026-07-22)."
          else
            echo "ASAN canary still fails on aarch64-apple-darwin (expected while rust#101247/#121624/#146367 stay open) - the sanitizer-less main sweep above is the macOS oracle."
          fi

      # G18a lockfile discipline: the committed fuzz/Cargo.lock must not drift under the run
      # (a drifted lock means the instrumented build resolved deps the committed graph does not pin).
      - name: 'G18a: committed fuzz/Cargo.lock did not drift'
        run: git diff --exit-code fuzz/Cargo.lock

      # A finding is never lost to an ephemeral runner: dump any minimized artifact base64 into the
      # log (bounded by -max_len=1 MiB) for the fixing box to commit under fuzz/crashes/.
      - name: 'On failure: dump minimized crash artifacts (base64) for the fuzz/crashes/ commit'
        if: failure()
        run: |
          if [ -d fuzz/artifacts ]; then
            find fuzz/artifacts -type f | while read -r f; do
              echo "::group::${f}"
              base64 "${f}"
              echo "::endgroup::"
            done
          else
            echo "no fuzz/artifacts/ directory - the failure was not a fuzz finding"
          fi
