# .github/workflows/secrets-history.yml - G2 nightly full-HISTORY secret scan (P0.3.1).
#
# The release-tier backstop: `gitleaks git` over the ENTIRE commit history (fetch-depth: 0), so a
# secret that EVER entered history is caught even if the L1 (--staged) / L2 (range) / L4 (dir,
# working-tree) planes scanned only a window of it. Runs nightly + on manual dispatch. A finding is
# a release-blocking alarm (rotate the secret; rewriting history alone is not enough). This file is
# L(-1) security-critical (.github/**, scripts/l-neg1-files.toml, G71).

name: secrets-history

on:
  schedule:
    - cron: '23 4 * * *'   # nightly, 04:23 UTC (offset minutes — GitHub thundering-herd guidance)
  workflow_dispatch:       # manual re-run (e.g. after a rotation)

# Least privilege: read-only (G49/G56). No secret is read here — the scan needs only the checkout.
permissions:
  contents: read

# A security history scan is never cancelled mid-run (cancel-in-progress: false, the G42/release
# polarity, NOT the per-push cancel) — and this workflow has no push trigger regardless.
concurrency:
  group: secrets-history-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gitleaks-history:
    name: gitleaks-history
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - name: Checkout (FULL history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0          # full history so `gitleaks git` scans EVERY commit (shallow = tip only)
      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: '3.12'
      - name: Install + verify the pinned gitleaks
        run: python3 scripts/install-gate-tools --tool gitleaks
      - name: 'G2: full-history gitleaks scan'
        run: python3 scripts/run-gitleaks --history
