# deny.toml — cargo-deny supply-chain policy (G18 + G18a wiring). Authored P0.3.6; the live
# `cargo deny check` activates in P1 once the workspace Cargo.lock exists (cargo-deny is pinned then).
# Until then this file is STRUCTURALLY growth-guarded by scripts/check-supply-chain (a stdlib parser
# that freezes the policy intent below — no quiet widening). Schema = cargo-deny v2 (validated against
# the pinned binary in P1). L(-1) security-critical (scripts/l-neg1-files.toml, G71).
#
# Threat anchors: T2 (untrusted bytes / WebView), T9a (a socket-opening dep in the core). The rule of
# the whole app is zero egress — so NO HTTP-client / updater crate may enter the dependency tree, and
# GPL/AGPL may not contaminate the MIT core (the copyleft image-worker libs ship as separate binaries,
# never linked into the core crate graph).

[graph]
# Evaluate the policy over EXACTLY the dependency graph ConvertIA ships: the four desktop release
# triples (spec §03 "Target triples" — Win x64 + macOS universal {x86_64,aarch64} + Linux x64; the
# Windows-ARM / Linux-musl triples are [DEFER], not v1). WHY pinned, not target-agnostic: tauri 2.11
# declares `reqwest` (→ `hyper`) ONLY under `cfg(any(target_os="android", apple-non-macos))`
# (tauri-2.11.3/Cargo.toml; tauri's own `cargo-udeps.ignore normal = ["reqwest"]`) — mobile-only deps
# that land in the target-agnostic Cargo.lock but compile into ZERO desktop artifacts (verified:
# `cargo tree -i reqwest --target <each desktop triple>` = "nothing to print"). WITHOUT `targets`,
# cargo-deny evaluates the UNION of all targets incl. android/ios and FALSE-flags these phantom mobile
# deps against the [bans] list below. Scoping to the shipped triples is the CORRECT semantics, NOT a
# carve-out: the [bans] guard stays fully effective for the shipped graph — an ungated / direct
# app-level `reqwest` is target-agnostic, appears on the desktop triples, and is STILL denied; only a
# dep gated to a NON-shipped target (which compiles into no artifact, so opens no egress) falls out of
# scope. This `targets` set is FROZEN by scripts/check-supply-chain (EXPECTED_GRAPH_TARGETS) so it can
# be neither silently WIDENED (re-masking a real banned dep) nor NARROWED (blinding a shipped triple);
# the zero-egress guarantee itself does not rest on this scope — G29 rule (g)/(j) ban std/tokio/libc
# sockets in first-party source regardless of deps. Note the scope narrows ALL cargo-deny checks, not
# only [bans]: a mobile-only transitive crate also drops out of cargo-deny's [advisories]/[licenses]
# evaluation — deliberate (it ships in zero artifacts), and its CVEs stay covered by cargo-audit (G17),
# which reads the FULL Cargo.lock irrespective of [graph].targets (the two-scanner backstop).
# [Build-Session-Entscheidung: P1.12]
targets = [
  "x86_64-pc-windows-msvc",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin",
  "x86_64-unknown-linux-gnu",
]
# frozen ON by check-supply-chain — off would let a banned crate reachable only via a non-default
# feature escape the [bans] egress evaluation.
all-features = true

[advisories]
# cargo-deny v2: vulnerability / unmaintained / unsound / notice all DENY by default; a yanked crate
# is a hard fail; nothing is ignored. Any id added to `ignore` here MUST also be ignored in the
# cargo-audit config (G18 two-scanner reconciliation) — check-supply-chain asserts the two sets agree.
version = 2
yanked = "deny"
ignore = []

[licenses]
# cargo-deny v2: ALLOW-LIST ONLY — anything not listed (incl. GPL/AGPL/LGPL and any unrecognised or
# low-confidence license) is DENIED. This is the fail-closed posture (symmetry with G36 on the JS side):
# a crate whose license cannot be resolved above the confidence threshold fails the build.
version = 2
confidence-threshold = 0.93
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "CC0-1.0",
  "MPL-2.0",
]
# No blanket per-crate license exceptions: a real exception is added here WITH a box-id + Dual-Review
# note (check-supply-chain growth-guards this list — it cannot quietly absorb a copyleft crate).
exceptions = []

[bans]
# multiple-versions intentionally "warn", NOT cargo-deny's "deny" default: a duplicate-version graph is
# a hygiene signal, not a security control (the T2/T9a egress controls are the deny[] list + sources),
# and duplicate transitive versions are common + not worth a hard build failure.
# [Build-Session-Entscheidung: P0.3.6]
multiple-versions = "warn"
wildcards = "deny"
# T2/T9a: no updater and no socket-opening HTTP-client crate enters the tree. tauri-plugin-http wraps
# reqwest and registers an IPC-accessible HTTP client on init — it is denied at the dependency level so
# a careless `cargo add` fails HERE (before it could ever reach G47 / a capability JSON).
deny = [
  { crate = "tauri-plugin-updater" },
  { crate = "tauri-plugin-http" },
  { crate = "reqwest" },
  { crate = "ureq" },
  { crate = "hyper" },
  { crate = "isahc" },
  { crate = "curl" },
  { crate = "curl-sys" },
]
# NOTE — the "deny EVERY tauri-plugin-* except the §0.10-granted allowlist {single-instance, dialog,
# opener, store, log}" rule cannot be expressed natively in cargo-deny (it has no deny-pattern-with-
# exceptions). It is enforced structurally instead by TWO independent presence-enforcers —
# scripts/check-supply-chain (this gate's own structural Cargo.lock scan, no cargo binary) AND plan-lint
# check 13 (which additionally forbids the forced-inert dep from being `.plugin()`-registered) — that
# assert every `tauri-plugin-*` crate in Cargo.lock is on that allowlist, or is the forced-transitive-inert
# `tauri-plugin-fs` (a mandatory TYPE-only dep of `tauri-plugin-dialog`; its fs: capability surface is
# independently denied by G47). Active in P1 when the lock exists. The deny[] list above hard-blocks the
# two specifically-dangerous plugins regardless.

[sources]
# the `sources` check is a no-op without an explicit allow-list, so populate it: only crates.io and an
# (empty) git allow-list. An unknown registry or git source is the dependency-confusion surface (the
# Rust analogue of G18c on the JS side).
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
