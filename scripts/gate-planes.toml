# scripts/gate-planes.toml - the defense-in-depth enforcement planes + the fail-open/closed
# policy, as machine-readable config (P0.2.12, G54b). This is the "empty-but-wired contract"
# the P0.3/P0.4 gates slot into: it is the SOURCE-OF-TRUTH for the plane STRUCTURE + the
# fail-open policy. The per-gate plane assignment + posture lives in the build-gates.md §5
# catalogue (kept in sync with this file + security-concept §3 by plan-lint, P0.3.5).
# Validated by scripts/check-gate-planes (G54b - the plane-DEFINITION-integrity sibling of the
# G54 plane-EXECUTION-integrity gate). L(-1) security-critical (scripts/l-neg1-files.toml, G71).
#
# A change passes staged, INDEPENDENT planes from idea to release; no plane trusts an earlier
# one to have caught everything (security-concept §3). Every gate that CAN run locally runs
# BOTH planes - locally (L1-L3) AND again on a clean checkout in CI (L4) - the two-enforcement-
# planes principle; inherently-CI-only gates (repo-config introspection, the heavy
# build/corpus/coverage/SAST gates, the release tier) run at L4/L5 only.

# fail-closed is the DEFAULT posture for EVERY gate. A gate is fail-OPEN only when another
# plane guarantees enforcement; each such case is an explicit [[fail_open]] row below that
# names its covering plane + the reason. A silent fail-open is forbidden.
default_posture = "fail-closed"

# --- the planes (security-concept §3) ---------------------------------------
[[plane]]
id = "L(-1)"
name = "change-control"
trigger = "any commit whose diff touches an L(-1) security-critical file"
enforcement = "owner-ack `L-neg1-ack: owner` commit-body trailer (G71, pre-push + L4 mirror); the autonomous Build-Loop NEVER edits an L(-1) file (hard-stop + escalate)"
mirror = "L2 + L4"

[[plane]]
id = "L0"
name = "build-loop-per-box"
trigger = "while building, before each commit"
enforcement = "the build-loop discipline + the Opus+Sonnet dual review (G1) on the staged diff; no fix-push cycle (no push between a fix and its re-review)"
mirror = "local"   # a quality amplifier, NOT a deterministic security control

[[plane]]
id = "L1"
name = "pre-commit"
trigger = "git commit"
budget_seconds = 10          # SOFT target (build-gates §0)
budget_kind = "soft"
enforcement = "lefthook pre-commit, parallel; diff-scoped gates"
mirror = "L1 + L4"

[[plane]]
id = "L2"
name = "pre-push"
trigger = "git push"
budget_seconds = 180
budget_kind = "hard"
enforcement = "lefthook pre-push; range / full-tree gates; cheap-commit (docs-only / check-off) fastpath"
mirror = "L2 + L4"

[[plane]]
id = "L3"
name = "commit-msg"
trigger = "git commit (chronologically BEFORE L2, which fires at git push)"
enforcement = "lefthook commit-msg; conventional-commit format + the dual-review trailer"
mirror = "L3 + L4"

[[plane]]
id = "L4"
name = "ci-clean-checkout"
trigger = "after push (GitHub Actions, the L4 mirror)"
enforcement = "clean-checkout re-run of the L1-L3 plane + the heavy CI-only gates (cross-platform build, corpus, coverage, SAST, SBOM, repo-config introspection)"
mirror = "the immutable net; G56a asserts in CI that the required-status-checks config exists, so 'a red L4 blocks' is real repo state"

[[plane]]
id = "L5"
name = "release-tier"
trigger = "v* tag (the release pipeline)"
enforcement = "release-acceptance gates (build matrix -> size -> SBOM + integrity -> minisign over SHA256SUMS -> build-provenance attestation -> publish); the G56b tag-trust gate gates entry BEFORE any secret is read"
mirror = "CI only (assembled in P10)"

# --- fail-OPEN exceptions (each justified by a covering plane) ---------------
# The recurring justified patterns (the only sanctioned reasons to fail-open):
#   (a) a DIFF-SCOPED local leg fail-opens without a diff base; its FULL-TREE L4 mirror is the
#       fail-closed net (so a missed local diff cannot escape - L4 re-checks the whole tree);
#   (b) a TARGET-ABSENT gate skips-with-warning while the artifact it inspects does not yet
#       exist (the P0 "authored now, fail-closes when the target lands" bootstrap posture);
#   (c) a gate with a SCHEDULED fail-soft -> fail-closed transition at a phase boundary
#       (the CONFIG-introspection gates) is fail-SOFT during the P0 bootstrap and fail-CLOSED
#       once its phase lands. Such a transition is NO LONGER a prose-only promise: it is bound
#       to the [[posture_flag]] registry below + plan-lint check 27, which fails CLOSED if a due
#       flip was not actually wired (the G71/P1 lesson — see the [[posture_flag]] note). G56a's
#       fork-PR row is pattern (a); G56b's signed-tag leg is the live pattern-(c) case (flips at P10).
# Rows are added by each gate's box as it is built (P0.3/P0.4+); the set below seeds the
# already-built fail-open legs. Every row MUST name `covered_by` + `reason`.

[[fail_open]]
gate = "G54"
leg = "push-from-stale-base"
fail_open_at = "L2"
covered_by = "L4"
reason = "the stale-base check skips when origin/main is unknown (fresh clone / offline); the L4 clean-checkout always fetches origin/main so the parity is re-established there (pattern a)"

[[fail_open]]
gate = "G56"
leg = "runner-host + cargo-fuzz pin (check_runner_host / check_fuzz_pin)"
fail_open_at = "L1/L2/L4"
covered_by = "P10 / P3+ activation"
reason = "no secret-reading job and no cargo-fuzz invocation exist until the signing job (P10) / the fuzz harness (P3+); the assertions are authored + self-tested now and fail-CLOSE the moment their target lands (pattern b)"

[[fail_open]]
gate = "G56a"
leg = "branch-protection / repo-config introspection — fork-PR only"
fail_open_at = "L4"
covered_by = "push + schedule --enforce (admin-read PAT)"
reason = "on push + schedule G56a runs --enforce fail-CLOSED with the fine-grained REPO_ADMIN_READ_TOKEN secret (Administration: Read; the default CI GITHUB_TOKEN holds no `administration` scope); only on a fork pull_request does it fall back to fail-soft on the default token, because GitHub withholds secrets from fork-triggered runs (pattern a) — and this loses nothing: a code PR cannot alter the repo's rulesets/branch-protection, so the config-change path (every push to main) + the weekly schedule canary are the fail-closed net"

[[fail_open]]
gate = "G56b"
leg = "signed-tag (leg 3)"
fail_open_at = "L5"
covered_by = "P0.7.17 provisioning"
reason = "git verify-tag is skip-with-warning until the SSH allowed-signers file is provisioned in P0.7.17, then fail-CLOSED; legs 1/2 (ancestry, green-history) are fail-closed always (pattern c)"

# (G71's former fail_open row was REMOVED when its scheduled P0->P1 flip was finally wired
#  (P1.66): check-l-neg1-ack is now invoked WITH --enforce at both L2 (lefthook pre-push) and
#  L4 (ci.yml), so the L(-1) cage is fail-CLOSED. Its [[posture_flag]] row below now GUARDS that
#  state — re-removing --enforce, or re-adding a fail_open excuse, re-fails plan-lint check 27.)

# --- posture-flag gates: a SCHEDULED fail-soft -> fail-closed transition, made MECHANICAL -----
# A "posture-flag" gate is one whose enforcement depends on a CLI flag (e.g. `--enforce`) and that
# is deliberately fail-soft during a bootstrap phase, due to flip fail-CLOSED once a named phase
# completes. Historically that flip was a PROSE-ONLY obligation (G71's --enforce was "wired from P1"
# per security-concept §2, this file's old fail_open row, and the ci.yml step name) that NO box owned
# and NO check verified -> it silently never happened (the cage ran fail-soft through all of P1).
# This registry closes that defect CLASS: plan-lint check 27 asserts that once `fail_closed_after_phase`
# is complete (every plan box of that phase is [x]), the gate is actually invoked with `enforce_flag`
# in EVERY `plane` file AND carries no fail_open excuse; check-gate-planes (G54b) validates this
# section's shape. A row stays here PERMANENTLY so the guard also catches a later regression.
[[posture_flag]]
gate = "G71"
script = "scripts/check-l-neg1-ack"
enforce_flag = "--enforce"
fail_closed_after_phase = "P1"
planes = ["lefthook.yml", ".github/workflows/ci.yml"]
reason = "the L(-1) change-control cage: fail-soft during the P0 bootstrap (the build itself edits L(-1) files under owner drive), fail-CLOSED from P1 (security-concept §2). The transition was unowned + unverified in P1 and silently never happened; this row + plan-lint check 27 make it self-healing-or-red."
