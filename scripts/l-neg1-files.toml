# scripts/l-neg1-files.toml - the authoritative L(-1) security-critical-file cage (P0.2.14, G71).
#
# Owner decision D1 (security-concept §2): the files that carry the power to silently weaken an
# enforcement plane are the **L(-1) set**. The autonomous Build-Loop NEVER edits one; an owner-
# driven L(-1) edit records an `L-neg1-ack: owner` commit-body trailer, which the G71 pre-push gate
# (scripts/check-l-neg1-ack) mechanically audits. This file is the MACHINE-READABLE projection of
# the security-concept §2 enumeration - the two are kept in sync (a §2 change without a matching
# pattern here, or vice-versa, is the drift G68 + a Co-Pilot review catch).
#
# This file is ITSELF L(-1) (matched by `scripts/*.toml` below), so the cage cannot be silently
# narrowed: removing a pattern is itself an L(-1) edit that needs the owner-ack trailer.
#
# Patterns are gitignore-style POSIX paths (forward slashes): `*` matches within one path segment,
# `**` matches any depth, `?` one non-`/` char. Matched against each commit's diff file paths. Many
# targets do not exist yet (deny.toml, .gitleaks.toml, supply-chain/, requirements-ci.txt, src-tauri/
# capabilities/, engines.lock, docs/process/) - their globs are authored NOW so the cage is ready
# the moment the file lands (a not-yet-existing glob simply matches nothing).

patterns = [
  # --- gate scripts + their self-tests (the enforcement logic itself) ---
  "scripts/check-*",              # check-branch-protection / check-ci-supply-chain / check-gate-plane(s) / ...
  "scripts/fastpath-*",           # the L2 fastpath skip detectors (G10)
  "scripts/run-*",                # gate drivers: run-gate-selftests (canary), run-gitleaks (G2)
  "scripts/plan-lint",            # the plan-lint / spec-lint doc-consistency gate (G7/G20)
  "scripts/install-gate-tools",   # the pinned-tool fetch-and-verify installer
  "scripts/setup-dev",            # patches the generated git hooks (a poisoned one silently no-ops the plane)
  "scripts/gate-selftests/**",    # every gate self-test (the planted-positive canaries)
  "tests/g53-fixture/**",         # the G53 negative fixture (a neutered planted-violation = false-green)
  "scripts/semgrep-rules/**",     # G29 SAST corpus: project rules (enforcement logic) + vendored packs (trust) + net-allow-list.txt (socket escape hatch) + planted-positive fixtures (a neutered canary = false-green)
  "scripts/*.toml",               # gate-planes.toml + l-neg1-files.toml itself (cage cannot be silently narrowed)

  # --- the enforcement-plane config ---
  "lefthook.yml",                 # the L1/L2/L3 git-hook executor
  ".github/**",                   # all CI workflows + composite actions + the G56b allowed-signers file

  # --- supply-chain trust configs ---
  "deny.toml",                    # cargo-deny bans/licenses/advisories
  ".npmrc",                       # JS registry pin + install-lifecycle lockdown (G18c/G18d)
  ".editorconfig",                # EOL/charset/final-newline policy enforced by G52 (editorconfig-checker)
  ".typos.toml",                  # G51 prose-typo allowlist (a silently-allowlisted real typo = un-scanned)
  ".gitleaks.toml",               # gitleaks rules + allowlist (G2)
  ".gitleaks-baseline.json",      # the gitleaks one-time accepted-findings baseline (G2)
  "supply-chain/**",              # cargo-vet exemption set (config.toml) + the committed imports.lock
  ".gitattributes",               # LFS / EOL / merge attributes
  ".lfsconfig",                   # git-LFS endpoint
  "requirements-ci.txt",          # the pip gate-toolchain layer (Semgrep et al.) - reads CI secrets + emits findings (r7, P0.2.14)

  # --- the build artifacts' trust roots ---
  "rust-toolchain.toml",          # the pinned Rust compiler channel (a bump = trusted-build subversion)
  "rustfmt.toml",                 # the Rust format contract (G3); a relaxation weakens the format plane
  "clippy.toml",                  # the Rust lint config (G4/G14); a broad allow weakens the no-panic deny
  "src-tauri/capabilities/**",    # the locked Tauri capabilities / permissions allowlist
  "engines.lock",                 # the pinned bundled-engine digests

  # --- the docs that DEFINE the gates + the process (incl. the reviewer-rubric block) ---
  "docs/security/**",             # security-concept.md + build-gates.md (the Gnn catalogue)
  "docs/process/**",              # build-loop.md / test-strategy.md / roles-and-escalation.md / vuln-response.md / the reviewer rubric
]
